<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEUROHUB | Kour.io</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00f2ff; --secondary: #ff007f; --bg: #010101; --glass: rgba(255, 255, 255, 0.03); }
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        #starfield { position: fixed; inset: 0; z-index: -1; }
        
        /* AUTH UI */
        #auth-gate { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: #080808; border: 2px solid var(--primary); padding: 40px; border-radius: 20px; width: 400px; text-align: center; box-shadow: 0 0 20px var(--primary); }
        input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 15px; color: white; border-radius: 10px; margin-bottom: 15px; outline: none; }
        input:focus { border-color: var(--primary); }
        
        .btn { background: var(--primary); color: #000; font-family: 'Orbitron'; font-weight: 900; padding: 15px; border-radius: 100px; border: none; cursor: pointer; width: 100%; transition: 0.3s; margin-top: 10px; }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--primary); }
        .toggle-link { color: var(--primary); cursor: pointer; font-size: 0.8rem; text-decoration: underline; margin-top: 15px; display: block; }

        /* MAIN UI */
        #main-ui { display: none; height: 100vh; padding: 40px; flex-direction: column; align-items: center; animation: slideUp 1s ease; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        h1 { font-family: 'Orbitron'; font-size: 3.5rem; letter-spacing: 10px; background: linear-gradient(to right, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>

<canvas id="starfield"></canvas>

<div id="auth-gate">
    <div class="auth-box">
        <h2 id="auth-title" style="font-family: 'Orbitron'; color: var(--primary);">NEURO LOGIN</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button id="auth-btn" class="btn" onclick="handleAuth()">LOGIN</button>
        <span id="toggle-text" class="toggle-link" onclick="toggleAuthMode()">Don't have an account? Sign Up</span>
        <p id="auth-msg" style="font-size: 0.8rem; color: #ff4444; margin-top: 10px;"></p>
    </div>
</div>

<div id="main-ui">
    <h1>NEUROHUB</h1>
    <p style="color: var(--primary);">WELCOME BACK, <span id="user-display"></span></p>
    <a href="chrome-extension://dhdgffkkebhmkfjojejmpbldmpobfkfo/options.html#nav=b61323f3-d211-4a7d-a58e-8b199d2549d1+editor" class="btn" style="width: auto; padding: 20px 60px;">INSTALL SCRIPT</a>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC-tWfooosC689hzDUC4S5CXL7dJ3yANuc",
        authDomain: "neuro-chat-8fe18.firebaseapp.com",
        databaseURL: "https://neuro-chat-8fe18-default-rtdb.firebaseio.com",
        projectId: "neuro-chat-8fe18",
        storageBucket: "neuro-chat-8fe18.firebasestorage.app",
        messagingSenderId: "490069277437",
        appId: "1:490069277437:web:c17aaa860bf4ecfd7b1c94"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let isSignUp = false;

    function toggleAuthMode() {
        isSignUp = !isSignUp;
        document.getElementById('auth-title').innerText = isSignUp ? "NEURO SIGN UP" : "NEURO LOGIN";
        document.getElementById('auth-btn').innerText = isSignUp ? "CREATE ACCOUNT" : "LOGIN";
        document.getElementById('toggle-text').innerText = isSignUp ? "Already have an account? Login" : "Don't have an account? Sign Up";
    }

    async function handleAuth() {
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value.trim();
        const msg = document.getElementById('auth-msg');

        if(!user || !pass) return;

        // Owner Hardcode
        if(user === "neuro(owner)" && pass === "admin") {
            enterHub(user);
            return;
        }

        const userRef = db.ref('users/' + user);

        if(isSignUp) {
            // Check if user exists
            const snapshot = await userRef.once('value');
            if(snapshot.exists()) {
                msg.innerText = "Username already taken!";
            } else {
                await userRef.set({ password: pass });
                enterHub(user);
            }
        } else {
            // Login check
            const snapshot = await userRef.once('value');
            if(snapshot.exists() && snapshot.val().password === pass) {
                enterHub(user);
            } else {
                msg.innerText = "Invalid username or password!";
            }
        }
    }

    function enterHub(username) {
        document.getElementById('auth-gate').style.display = 'none';
        document.getElementById('main-ui').style.display = 'flex';
        document.getElementById('user-display').innerText = username.toUpperCase();
    }

    // Starfield Animation
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function init() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        for(let i=0; i<100; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*4+2, l: Math.random()*20+5});
    }
    function draw() {
        ctx.clearRect(0,0,canvas.width, canvas.height); ctx.strokeStyle = "#00f2ff44"; ctx.lineWidth = 2;
        stars.forEach(s => { ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(s.x, s.y+s.l); ctx.stroke(); s.y += s.s; if(s.y > canvas.height) s.y = -20; });
        requestAnimationFrame(draw);
    }
    init(); draw();
</script>
</body>
</html>
