<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEUROHUB | Elite Project</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #050505;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        /* FALLING STARS BACKGROUND */
        #star-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: fall linear infinite;
        }

        @keyframes fall {
            from { transform: translateY(-10vh); }
            to { transform: translateY(110vh); }
        }

        /* TABS STYLING */
        .tabs-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 50px;
        }

        .tab-btn {
            background: #0a0a0a;
            color: #888;
            border: 1px solid #222;
            padding: 12px 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tab-btn.active {
            border-color: #00ffcc;
            color: #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
            background: rgba(0, 255, 204, 0.05);
        }

        /* CHEAT CARDS */
        .tab-content {
            display: none;
            padding: 40px;
            text-align: center;
        }

        .cheat-card {
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid #1a1a1a;
            padding: 50px;
            border-radius: 15px;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .xeno-title {
            color: #00ffcc;
            font-size: 2.5rem;
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.5);
        }

        .xeno-desc {
            color: #aaa;
            font-size: 0.9rem;
            letter-spacing: 3px;
            margin-bottom: 30px;
        }

        .download-btn {
            background: transparent;
            border: 2px solid #00ffcc;
            color: #00ffcc;
            padding: 15px 45px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.4s;
        }

        .download-btn:hover {
            background: #00ffcc;
            color: black;
            box-shadow: 0 0 25px #00ffcc;
        }

        /* OWNER PANEL */
        #ownerPanel {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #ff0055;
            padding: 20px;
            border-radius: 10px;
            z-index: 1000;
            box-shadow: 0 0 20px #ff0055;
            width: 200px;
        }

        .panel-btn {
            width: 100%;
            background: #111;
            color: white;
            border: 1px solid #333;
            padding: 10px;
            margin-bottom: 5px;
            cursor: pointer;
        }

        .panel-btn:hover { background: #ff0055; color: white; }
    </style>
</head>
<body>

    <div id="star-container"></div>

    <h1 style="text-align: center; margin-top: 80px; font-size: 3rem; letter-spacing: 10px;">NEURO<span style="color:#00ffcc">HUB</span></h1>

    <div class="tabs-container">
        <button class="tab-btn active" onclick="openTab(event, 'roblox')">Roblox Cheats</button>
        <button class="tab-btn" onclick="openTab(event, 'browser')">Browser Cheats</button>
    </div>

    <div id="roblox" class="tab-content" style="display: block;">
        <div class="cheat-card">
            <h2 class="xeno-title">XENO EXECUTOR</h2>
            <p class="xeno-desc">BEST FREE RELIABLE EXECUTOR</p>
            <button onclick="window.location.href='https://xeno.onl'" class="download-btn">DOWNLOAD</button>
        </div>
    </div>

    <div id="browser" class="tab-content">
        <div class="cheat-card">
            <h2>BROWSER SCRIPTS</h2>
            <p style="color:#666">No scripts currently uploaded.</p>
        </div>
    </div>

    <div id="ownerPanel">
        <h3 style="color: #ff0055; margin-top: 0;">OWNER PANEL</h3>
        <button class="panel-btn">MANAGE USERS</button>
        <button class="panel-btn">EDIT SCRIPTS</button>
        <button onclick="document.getElementById('ownerPanel').style.display='none'" style="width:100%; background:none; color:grey; border:none; cursor:pointer;">Close</button>
    </div>

    <script>
        // 1. FIREBASE CONFIG - PASTE YOUR DATA FROM FIREBASE CONSOLE HERE
        const firebaseConfig = {
            apiKey: "PASTE_HERE",
            authDomain: "PASTE_HERE",
            projectId: "PASTE_HERE",
            storageBucket: "PASTE_HERE",
            messagingSenderId: "PASTE_HERE",
            appId: "PASTE_HERE"
        };
        firebase.initializeApp(firebaseConfig);

        // 2. DISCORD ID CHECK - PASTE YOUR DISCORD USER ID HERE
        const MY_DISCORD_ID = "PASTE_YOUR_ID_HERE";

        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                // Check Provider Data for Discord UID
                const discordUID = user.providerData[0].uid;
                if (discordUID === MY_DISCORD_ID) {
                    document.getElementById('ownerPanel').style.display = 'block';
                }
            }
        });

        // 3. TAB LOGIC
        function openTab(evt, tabName) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tab-content");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = "none";
            }
            tablinks = document.getElementsByClassName("tab-btn");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(" active", "");
            }
            document.getElementById(tabName).style.display = "block";
            evt.currentTarget.className += " active";
        }

        // 4. FALLING STARS GENERATOR
        const container = document.getElementById('star-container');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.left = Math.random() * 100 + 'vw';
            star.style.animationDuration = Math.random() * 3 + 2 + 's';
            star.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(star);
        }
    </script>
</body>
</html>
