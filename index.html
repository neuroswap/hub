<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEUROHUB</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #00f2ff; --secondary: #ff007f; --bg: #010101; --border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; transition: 0.2s; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        
        /* AUTH & BAN */
        #ban-screen, #auth-gate { position: fixed; inset: 0; background: #000; z-index: 20000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        #auth-gate { z-index: 10000; }
        .auth-box { background: #080808; border: 2px solid var(--primary); padding: 40px; border-radius: 20px; width: 350px; text-align: center; }
        input { width: 100%; background: #111; border: 1px solid var(--border); padding: 12px; color: #fff; margin: 10px 0; border-radius: 5px; }

        /* MAIN UI */
        #main-ui { display: none; height: 100vh; grid-template-columns: 250px 1fr; }
        .sidebar { background: #050505; border-right: 1px solid var(--border); padding: 30px 20px; }
        .nav-tab { padding: 15px; margin: 5px 0; cursor: pointer; font-family: 'Orbitron'; font-size: 0.8rem; color: #666; }
        .nav-tab.active { color: var(--primary); border-left: 3px solid var(--primary); background: rgba(0,242,255,0.05); }

        .content { padding: 50px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .panel { background: #0a0a0a; border: 1px solid var(--border); padding: 25px; border-radius: 15px; }
        
        .btn { display: block; width: 100%; padding: 12px; background: var(--primary); color: #000; text-decoration: none; text-align: center; border-radius: 5px; font-family: 'Orbitron'; font-weight: 900; margin-top: 15px; font-size: 0.8rem; }
        .btn:hover { opacity: 0.8; transform: scale(1.02); }
    </style>
</head>
<body>

    <div id="ban-screen" style="display:none;">
        <h1 style="font-family:'Orbitron'; color:var(--secondary);">USER BANNED</h1>
    </div>

    <div id="auth-gate">
        <div class="auth-box">
            <h2 style="font-family:'Orbitron'; color:var(--primary); margin-bottom:20px;">NEUROHUB</h2>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="login()" class="btn">LOGIN</button>
        </div>
    </div>

    <div id="main-ui">
        <div class="sidebar">
            <h2 style="font-family:'Orbitron'; color:var(--primary); margin-bottom:40px;">NEUROHUB</h2>
            <div class="nav-tab active">PRODUCTS</div>
            <div class="nav-tab">COMMUNITY</div>
            <div class="nav-tab">SUPPORT</div>
            <div style="margin-top:auto;" class="nav-tab" onclick="location.reload()">LOGOUT</div>
        </div>

        <div class="content">
            <h1 style="font-family:'Orbitron'; margin-bottom:30px;">DASHBOARD</h1>
            <div class="grid">
                <div class="panel">
                    <h2 style="font-family:'Orbitron'; color:var(--primary); margin:0;">V6 OPTIMIZER</h2>
                    <p style="color:#777; font-size:0.8rem; margin-top:10px;">Stand-alone PC Utility. Cleans cache and reduces latency.</p>
                    <a href="https://cdn.discordapp.com/attachments/1494771382188245186/1494771426979221694/NeuroHub_V6_Elite.exe?ex=69e3d1df&is=69e2805f&hm=30b33810ca8741e2100c22616c82dec4008a9d07821cc1f0b088c9bc461058eb&" class="btn">DOWNLOAD EXE</a>
                </div>

                <div class="panel">
                    <h2 style="font-family:'Orbitron'; color:var(--secondary); margin:0;">kour.io cheat</h2>
                    <p style="color:#777; font-size:0.8rem; margin-top:10px;">aimbot esp crosshair</p>
                    <a href="#" class="btn" style="background:var(--secondary);">INSTALL SCRIPT</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://neuro-chat-8fe18-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            db.ref('bans/' + u).once('value', snapshot => {
                if(snapshot.exists()) {
                    document.getElementById('ban-screen').style.display = 'flex';
                } else if(u === "neuro" && p === "owner") {
                    document.getElementById('auth-gate').style.display = 'none';
                    document.getElementById('main-ui').style.display = 'grid';
                } else {
                    alert("Wrong login");
                }
            });
        }
    </script>
</body>
</html>
